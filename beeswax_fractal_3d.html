<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beeswax Fractal — ARA φ-Cascade Corridor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }

  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 16px; pointer-events: none; z-index: 10;
  }

  #title-panel {
    color: #b8860b; pointer-events: auto;
  }
  #title-panel h1 { font-size: 1.3rem; letter-spacing: 0.05em; margin-bottom: 4px; }
  #title-panel .sub { font-size: 0.75rem; color: #888; }

  #controls {
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: auto; background: rgba(10,10,18,0.85);
    padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2a4a;
    min-width: 200px;
  }
  #controls label { color: #aaa; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
  #controls input[type=range] { width: 100px; }
  #controls button {
    background: #1a1a2e; color: #b8860b; border: 1px solid #b8860b;
    padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem;
    transition: background 0.2s;
  }
  #controls button:hover { background: #2a2a3e; }
  #controls button.active { background: #b8860b; color: #0a0a12; }

  #legend {
    position: absolute; bottom: 12px; left: 16px;
    background: rgba(10,10,18,0.85); padding: 10px 14px;
    border-radius: 8px; border: 1px solid #2a2a4a; z-index: 10;
  }
  #legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 0.72rem; color: #ccc; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  #info-panel {
    position: absolute; bottom: 12px; right: 16px;
    background: rgba(10,10,18,0.85); padding: 10px 14px;
    border-radius: 8px; border: 1px solid #2a2a4a; z-index: 10;
    color: #888; font-size: 0.7rem; max-width: 240px;
  }
  #info-panel .metric { color: #b8860b; font-size: 1.1rem; font-weight: bold; }
</style>
</head>
<body>

<div id="ui">
  <div id="title-panel">
    <h1>Beeswax Fractal Corridor</h1>
    <div class="sub">ARA &phi;-Cascade &mdash; 3D Simulation</div>
  </div>
  <div id="controls">
    <label>Depth <span id="depth-val">3</span>
      <input type="range" id="depth" min="1" max="5" value="3" step="1">
    </label>
    <label>Speed <span id="speed-val">1.0</span>
      <input type="range" id="speed" min="0.1" max="3" value="1" step="0.1">
    </label>
    <label>Trail length <span id="trail-val">200</span>
      <input type="range" id="trail" min="50" max="500" value="200" step="10">
    </label>
    <label>Opacity <span id="opacity-val">0.4</span>
      <input type="range" id="opacity" min="0.05" max="0.8" value="0.4" step="0.05">
    </label>
    <div style="display:flex; gap:4px; flex-wrap:wrap; margin-top:4px;">
      <button class="active" data-formula="223o">223o Champion</button>
      <button class="active" data-formula="223d">223d Mirror</button>
      <button class="active" data-formula="223p">223p Blended</button>
      <button class="active" data-formula="203b">203b Baseline</button>
    </div>
    <button id="reset-btn" style="margin-top:4px;">Reset Paths</button>
  </div>
</div>

<div id="legend">
  <div class="row"><span class="dot" style="background:#ff6b6b;"></span> 223o &mdash; Phase-diff + Log + AsymHale (LOO 33.03)</div>
  <div class="row"><span class="dot" style="background:#4ecdc4;"></span> 223d &mdash; Mirror collision (LOO 33.25)</div>
  <div class="row"><span class="dot" style="background:#ffe66d;"></span> 223p &mdash; Blended &alpha;=1/&phi; (LOO 33.60, 6/7 splits)</div>
  <div class="row"><span class="dot" style="background:#a78bfa;"></span> 203b &mdash; ARA gate baseline (LOO 37.66)</div>
</div>

<div id="info-panel">
  <div>Cycle: <span id="cycle-num" class="metric">1</span></div>
  <div style="margin-top:4px;">Orbit + scroll to zoom. Click formulas to toggle.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ CONSTANTS ============
const PHI = (1 + Math.sqrt(5)) / 2;
const INV_PHI = 1 / PHI;
const TAU = Math.PI * 2;
const GOLDEN_ANGLE = TAU / (PHI * PHI); // ~137.5 degrees

// Solar cycle data (start, peak, amplitude, duration)
const CYCLES = [
  [1755.2,1761.5,144.1,11.3],[1766.5,1769.7,193.0,9.0],[1775.5,1778.4,264.3,9.3],
  [1784.7,1788.1,235.3,13.6],[1798.3,1805.2,82.0,12.3],[1810.6,1816.4,81.2,12.7],
  [1823.3,1829.9,119.2,10.5],[1833.8,1837.2,244.9,9.7],[1843.5,1848.1,219.9,12.4],
  [1855.9,1860.1,186.2,11.3],[1867.2,1870.6,234.0,11.8],[1878.9,1883.9,124.4,11.3],
  [1890.2,1894.1,146.5,11.8],[1902.0,1906.2,107.1,11.5],[1913.5,1917.6,175.7,10.1],
  [1923.6,1928.4,130.2,10.1],[1933.8,1937.4,198.6,10.4],[1944.2,1947.5,218.7,10.2],
  [1954.3,1958.2,285.0,10.5],[1964.9,1968.9,156.6,11.7],[1976.5,1979.9,232.9,10.3],
  [1986.8,1989.6,212.5,9.7],[1996.4,2001.9,180.3,12.3],[2008.0,2014.3,116.4,11.0],
  [2019.5,2024.5,173.0,11.0]
];
const peakAmps = CYCLES.map(c => c[2]);
const peakYears = CYCLES.map(c => c[1]);
const meanAmp = peakAmps.reduce((a,b)=>a+b,0)/peakAmps.length;

// Periods for cascade
const PERIODS = [Math.pow(PHI,11), Math.pow(PHI,9), Math.pow(PHI,6), Math.pow(PHI,4)];

// Formula colours
const FORMULA_COLORS = {
  '223o': 0xff6b6b,
  '223d': 0x4ecdc4,
  '223p': 0xffe66d,
  '203b': 0xa78bfa,
};

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a12, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 60);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a12);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x334455, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
dirLight.position.set(20, 40, 30);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xb8860b, 0.5, 100);
pointLight.position.set(0, 15, 0);
scene.add(pointLight);

// ============ ORBIT CONTROLS (manual) ============
let orbitTheta = 0.3, orbitPhi = 0.8, orbitRadius = 70;
let isDragging = false, lastMouse = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; lastMouse = {x: e.clientX, y: e.clientY}; });
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
  orbitTheta -= dx * 0.005;
  orbitPhi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitPhi - dy * 0.005));
  lastMouse = {x: e.clientX, y: e.clientY};
});
window.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('wheel', e => {
  orbitRadius = Math.max(10, Math.min(200, orbitRadius + e.deltaY * 0.05));
});
// Touch support
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; lastMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY}; }
});
renderer.domElement.addEventListener('touchmove', e => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastMouse.x, dy = e.touches[0].clientY - lastMouse.y;
  orbitTheta -= dx * 0.005;
  orbitPhi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitPhi - dy * 0.005));
  lastMouse = {x: e.touches[0].clientX, y: e.touches[0].clientY};
});
renderer.domElement.addEventListener('touchend', () => isDragging = false);

function updateCamera() {
  camera.position.x = orbitRadius * Math.sin(orbitPhi) * Math.cos(orbitTheta);
  camera.position.y = orbitRadius * Math.cos(orbitPhi);
  camera.position.z = orbitRadius * Math.sin(orbitPhi) * Math.sin(orbitTheta);
  camera.lookAt(0, 0, 0);
}

// ============ BEESWAX FRACTAL GEOMETRY ============
const hexGroup = new THREE.Group();
scene.add(hexGroup);

function createHexTube(radius, length, position, rotation, opacity, color) {
  // Hexagonal cross-section
  const shape = new THREE.Shape();
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * TAU + Math.PI / 6;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    if (i === 0) shape.moveTo(x, y);
    else shape.lineTo(x, y);
  }
  shape.closePath();

  // Inner hole
  const hole = new THREE.Path();
  const innerR = radius * 0.85;
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * TAU + Math.PI / 6;
    const x = Math.cos(angle) * innerR;
    const y = Math.sin(angle) * innerR;
    if (i === 0) hole.moveTo(x, y);
    else hole.lineTo(x, y);
  }
  hole.closePath();
  shape.holes.push(hole);

  const extrudeSettings = { depth: length, bevelEnabled: false };
  const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
  const material = new THREE.MeshPhongMaterial({
    color: color || 0xb8860b,
    transparent: true,
    opacity: opacity || 0.3,
    side: THREE.DoubleSide,
    shininess: 40,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.copy(position);
  if (rotation) mesh.rotation.set(rotation.x, rotation.y, rotation.z);
  return mesh;
}

function buildBeeswaxFractal(depth, parentPos, parentDir, parentRadius, parentLength, level) {
  if (level > depth) return;

  const opacity = 0.15 + 0.1 * (depth - level);
  const hue = 0.1 + level * 0.04; // amber to gold shift
  const color = new THREE.Color().setHSL(hue, 0.7, 0.4 + level * 0.05);

  // Main corridor
  const tube = createHexTube(parentRadius, parentLength, parentPos, parentDir, opacity, color);
  hexGroup.add(tube);

  // Edge wireframe for visibility
  const wireGeo = tube.geometry.clone();
  const wireMat = new THREE.MeshBasicMaterial({
    color: color,
    wireframe: true,
    transparent: true,
    opacity: opacity * 0.6,
  });
  const wire = new THREE.Mesh(wireGeo, wireMat);
  wire.position.copy(tube.position);
  wire.rotation.copy(tube.rotation);
  hexGroup.add(wire);

  if (level >= depth) return;

  // Branch at golden angle intervals — three sub-corridors at each junction
  const childRadius = parentRadius * INV_PHI;
  const childLength = parentLength * INV_PHI;

  for (let b = 0; b < 3; b++) {
    const branchAngle = GOLDEN_ANGLE * (b + 1);
    const tiltAngle = Math.PI / 6 + b * 0.15;

    // End of parent corridor
    const endPos = new THREE.Vector3(
      parentPos.x + Math.sin(parentDir.y) * Math.cos(parentDir.x) * parentLength,
      parentPos.y + Math.sin(parentDir.x) * parentLength * 0.3,
      parentPos.z + Math.cos(parentDir.y) * Math.cos(parentDir.x) * parentLength
    );

    // Offset for each branch
    const offsetX = Math.cos(branchAngle) * parentRadius * 0.5;
    const offsetZ = Math.sin(branchAngle) * parentRadius * 0.5;

    const childPos = new THREE.Vector3(
      endPos.x + offsetX,
      endPos.y + Math.sin(tiltAngle) * childLength * 0.2,
      endPos.z + offsetZ
    );

    const childDir = new THREE.Euler(
      parentDir.x + (b - 1) * 0.3 * INV_PHI,
      parentDir.y + branchAngle,
      0
    );

    buildBeeswaxFractal(depth, childPos, childDir, childRadius, childLength, level + 1);
  }
}

let currentDepth = 3;
function rebuildFractal(depth) {
  while (hexGroup.children.length) {
    const c = hexGroup.children[0];
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
    hexGroup.remove(c);
  }

  // Central hub — large hexagonal chamber
  const hubGeo = new THREE.CylinderGeometry(3, 3, 2, 6);
  const hubMat = new THREE.MeshPhongMaterial({
    color: 0xdaa520, transparent: true, opacity: 0.25, side: THREE.DoubleSide
  });
  const hub = new THREE.Mesh(hubGeo, hubMat);
  hexGroup.add(hub);

  // Hub wireframe
  const hubWire = new THREE.Mesh(hubGeo.clone(), new THREE.MeshBasicMaterial({
    color: 0xdaa520, wireframe: true, transparent: true, opacity: 0.3
  }));
  hexGroup.add(hubWire);

  // Six main corridors radiating from hub
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * TAU + GOLDEN_ANGLE * i * 0.1; // slight golden twist
    const startPos = new THREE.Vector3(
      Math.cos(angle) * 3,
      (i % 2 === 0 ? 1 : -1) * 0.5,
      Math.sin(angle) * 3
    );
    const dir = new THREE.Euler(
      (i % 3 - 1) * 0.15,
      angle,
      0
    );
    const radius = 2.5 * Math.pow(INV_PHI, 0);
    const length = 15;
    buildBeeswaxFractal(depth, startPos, dir, radius, length, 0);
  }

  currentDepth = depth;
}

rebuildFractal(3);

// ============ FORMULA PATH SIMULATION ============

// Simplified formula models — compute a position in 3D beeswax space for each cycle
function computeFormulaPath(formulaId) {
  const path = [];
  const GLEISSBERG = Math.pow(PHI, 9);
  const SCHWABE = Math.pow(PHI, 5);

  for (let i = 0; i < CYCLES.length; i++) {
    const t = peakYears[i];
    const amp = peakAmps[i];
    const normAmp = (amp - 80) / (285 - 80); // 0-1

    // Base position from cascade phases
    let phases = PERIODS.map(p => TAU * (t - 1700) / p);

    let x = 0, y = 0, z = 0;

    if (formulaId === '223o') {
      // Phase-diff + log tension + asymmetric Hale
      for (let j = 0; j < phases.length; j++) {
        const eps = j > 0 ? Math.cos(phases[j-1] - phases[j]) * INV_PHI : 0;
        const tension = Math.sign(Math.sin(phases[j])) * Math.log(1 + Math.abs(Math.sin(phases[j]))) / Math.log(2);
        x += Math.cos(phases[j]) * (1 + eps) * (8 - j * 1.5);
        z += Math.sin(phases[j]) * (1 + eps) * (8 - j * 1.5);
        y += tension * (3 - j * 0.5);
      }
      // Asymmetric Hale
      if (i > 0) {
        const prevDev = (peakAmps[i-1] - meanAmp) / meanAmp;
        const grief = prevDev < 0 ? PHI : 1.0;
        y += prevDev * grief * 3;
      }
    } else if (formulaId === '223d') {
      // Mirror collision
      for (let j = 0; j < phases.length; j++) {
        const mirror = j > 0 ? -Math.cos(phases[j-1]) * Math.cos(phases[j]) * INV_PHI : 0;
        x += Math.cos(phases[j]) * (1 + mirror) * (8 - j * 1.5);
        z += Math.sin(phases[j]) * (1 + mirror) * (8 - j * 1.5);
        y += Math.sin(phases[j]) * (3 - j * 0.5);
      }
    } else if (formulaId === '223p') {
      // Blended alpha=1/phi
      const alpha = INV_PHI;
      for (let j = 0; j < phases.length; j++) {
        let collision = 0;
        if (j > 0) {
          const vertex = -Math.cos(phases[j-1]) * Math.cos(phases[j]);
          const edge = -Math.sin(phases[j-1]) * Math.sin(phases[j]);
          collision = (vertex + alpha * edge) * INV_PHI;
        }
        x += Math.cos(phases[j]) * (1 + collision) * (8 - j * 1.5);
        z += Math.sin(phases[j]) * (1 + collision) * (8 - j * 1.5);
        y += Math.sin(phases[j]) * (3 - j * 0.5);
      }
    } else if (formulaId === '203b') {
      // ARA gate baseline — simpler sawtooth
      const gp = TAU * (t - 1700) / GLEISSBERG;
      const sp = TAU * (t - 1700) / SCHWABE;
      const gate = ((gp % TAU) / TAU) * PHI;
      for (let j = 0; j < phases.length; j++) {
        x += Math.cos(phases[j]) * gate * (7 - j * 1.5);
        z += Math.sin(phases[j]) * gate * (7 - j * 1.5);
        y += Math.cos(sp) * (4 - j);
      }
    }

    // Scale to fit the fractal structure
    const scale = 1.5;
    path.push(new THREE.Vector3(x * scale * 0.3, y * scale * 0.5, z * scale * 0.3));
  }

  // Interpolate between cycles for smooth animation
  const smoothPath = [];
  const stepsPerCycle = 60;
  for (let i = 0; i < path.length - 1; i++) {
    for (let s = 0; s < stepsPerCycle; s++) {
      const t = s / stepsPerCycle;
      // Cubic interpolation for smoother curves
      const t2 = t * t;
      const t3 = t2 * t;
      const smooth = 3 * t2 - 2 * t3; // smoothstep

      const p = new THREE.Vector3().lerpVectors(path[i], path[i+1], smooth);

      // Add micro-wobble along the corridor walls
      const wobblePhase = (i * stepsPerCycle + s) * 0.15;
      p.x += Math.sin(wobblePhase * PHI) * 0.3;
      p.y += Math.cos(wobblePhase) * 0.2;
      p.z += Math.sin(wobblePhase * INV_PHI) * 0.3;

      smoothPath.push(p);
    }
  }
  // Add last point
  smoothPath.push(path[path.length - 1].clone());

  return smoothPath;
}

// ============ BALL AND TRAIL OBJECTS ============
const formulaStates = {};
const formulaVisible = { '223o': true, '223d': true, '223p': true, '203b': true };
const trailGroup = new THREE.Group();
scene.add(trailGroup);

function initFormula(id) {
  const path = computeFormulaPath(id);
  const color = FORMULA_COLORS[id];

  // Ball
  const ballGeo = new THREE.SphereGeometry(0.6, 16, 16);
  const ballMat = new THREE.MeshPhongMaterial({
    color: color, emissive: color, emissiveIntensity: 0.5
  });
  const ball = new THREE.Mesh(ballGeo, ballMat);
  ball.position.copy(path[0]);
  scene.add(ball);

  // Glow
  const glowGeo = new THREE.SphereGeometry(1.0, 12, 12);
  const glowMat = new THREE.MeshBasicMaterial({
    color: color, transparent: true, opacity: 0.15
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  ball.add(glow);

  // Trail line
  const maxTrail = 500;
  const trailPositions = new Float32Array(maxTrail * 3);
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  trailGeo.setDrawRange(0, 0);
  const trailMat = new THREE.LineBasicMaterial({
    color: color, transparent: true, opacity: 0.7
  });
  const trailLine = new THREE.Line(trailGeo, trailMat);
  trailGroup.add(trailLine);

  formulaStates[id] = {
    path, ball, glow, trailLine, trailGeo, trailPositions,
    trailHistory: [],
    pathIndex: 0,
    color
  };
}

function resetFormulas() {
  Object.keys(formulaStates).forEach(id => {
    const s = formulaStates[id];
    s.pathIndex = 0;
    s.trailHistory = [];
    s.trailGeo.setDrawRange(0, 0);
    s.ball.position.copy(s.path[0]);
  });
}

// Init all formulas
['223o', '223d', '223p', '203b'].forEach(initFormula);

// ============ UI CONTROLS ============
const depthSlider = document.getElementById('depth');
const speedSlider = document.getElementById('speed');
const trailSlider = document.getElementById('trail');
const opacitySlider = document.getElementById('opacity');

depthSlider.addEventListener('input', e => {
  document.getElementById('depth-val').textContent = e.target.value;
  rebuildFractal(parseInt(e.target.value));
  // Update opacity
  const op = parseFloat(opacitySlider.value);
  hexGroup.traverse(c => {
    if (c.material && c.material.transparent) c.material.opacity = op;
  });
});

speedSlider.addEventListener('input', e => {
  document.getElementById('speed-val').textContent = parseFloat(e.target.value).toFixed(1);
});

trailSlider.addEventListener('input', e => {
  document.getElementById('trail-val').textContent = e.target.value;
});

opacitySlider.addEventListener('input', e => {
  const op = parseFloat(e.target.value);
  document.getElementById('opacity-val').textContent = op.toFixed(2);
  hexGroup.traverse(c => {
    if (c.material && c.material.transparent && !c.material.wireframe) {
      c.material.opacity = op;
    }
    if (c.material && c.material.wireframe) {
      c.material.opacity = op * 0.6;
    }
  });
});

document.querySelectorAll('[data-formula]').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.formula;
    formulaVisible[id] = !formulaVisible[id];
    btn.classList.toggle('active');
    const s = formulaStates[id];
    s.ball.visible = formulaVisible[id];
    s.trailLine.visible = formulaVisible[id];
  });
});

document.getElementById('reset-btn').addEventListener('click', resetFormulas);

// ============ ANIMATION LOOP ============
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const speed = parseFloat(speedSlider.value);
  const maxTrailLen = parseInt(trailSlider.value);

  // Slow auto-rotate when not dragging
  if (!isDragging) {
    orbitTheta += delta * 0.05;
  }
  updateCamera();

  // Gentle breathing animation on the fractal
  const breathe = Math.sin(clock.elapsedTime * 0.3) * 0.02 + 1;
  hexGroup.scale.set(breathe, breathe, breathe);

  // Point light orbit
  pointLight.position.x = Math.sin(clock.elapsedTime * 0.5) * 15;
  pointLight.position.z = Math.cos(clock.elapsedTime * 0.5) * 15;

  // Update formula balls
  Object.keys(formulaStates).forEach(id => {
    if (!formulaVisible[id]) return;
    const s = formulaStates[id];

    // Advance along path
    s.pathIndex += speed * 0.5;
    if (s.pathIndex >= s.path.length) s.pathIndex = 0;

    const idx = Math.floor(s.pathIndex);
    const frac = s.pathIndex - idx;
    const nextIdx = Math.min(idx + 1, s.path.length - 1);

    const pos = new THREE.Vector3().lerpVectors(s.path[idx], s.path[nextIdx], frac);
    s.ball.position.copy(pos);

    // Update trail
    s.trailHistory.push(pos.clone());
    if (s.trailHistory.length > maxTrailLen) {
      s.trailHistory.shift();
    }

    const positions = s.trailPositions;
    for (let i = 0; i < s.trailHistory.length; i++) {
      positions[i * 3] = s.trailHistory[i].x;
      positions[i * 3 + 1] = s.trailHistory[i].y;
      positions[i * 3 + 2] = s.trailHistory[i].z;
    }
    s.trailGeo.attributes.position.needsUpdate = true;
    s.trailGeo.setDrawRange(0, s.trailHistory.length);

    // Glow pulse
    s.glow.material.opacity = 0.1 + Math.sin(clock.elapsedTime * 3 + FORMULA_COLORS[id]) * 0.05;
  });

  // Update cycle display
  const champState = formulaStates['223o'];
  if (champState) {
    const cycleIdx = Math.floor(champState.pathIndex / 60);
    document.getElementById('cycle-num').textContent = Math.min(cycleIdx + 1, 25);
  }

  renderer.render(scene, camera);
}

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
